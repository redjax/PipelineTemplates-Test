---
##################################
# Test building a 'flat' Go app, #
# where the main.go is at the    #
# root of the repository.        #
##################################

name: Build Go App (flat)

on:
  workflow_dispatch:

jobs:
  build:
    uses: redjax/PipelineTemplates/.github/workflows/go-build.yml@github/go-build/v0.0.7
    with:
      module-dir: .
      build-package: .
      binary-name: ex
      platforms: linux/amd64,linux/arm64
      upload-artifacts: true
      artifact-name: example-dist
      ldflags: -X main.version=${{ github.sha }}
