---
name: Docker Build app1 (GHCR)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: redjax/pipelinetemplates-test-app1

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Build and publish app1
        uses: redjax/PipelineTemplates/.github/actions/docker-build-publish@feat/gh-docker-build-publish
        with:
          context: containers/app1
          dockerfile: Dockerfile
          image_name: ${{ env.IMAGE_NAME }}
          tags: |
            latest
          push: "true"
          platforms: linux/amd64
          build_args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
          cache_from: ""
          cache_to: ""
          registry: ${{ env.REGISTRY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
