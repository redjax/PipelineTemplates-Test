---
name: Test Gotify Merged Extras Notification

on:
  workflow_dispatch:

jobs:
  notify:
    # uses: redjax/PipelineTemplates/.github/workflows/gotify-notification.yml@github/notify-gotify@v0.0.0
    uses: redjax/PipelineTemplates/.github/workflows/gotify-notification.yml@feat/gotify-notification

    with:
      gotify-url: ${{ secrets.GOTIFY_URL }}

      title: Pipeline Test

      message: Test notification with merged extras

      extras-json: |
        {
          "custom::ci": {
            "pipeline": "deploy",
            "environment": "production"
          }
        }

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}
