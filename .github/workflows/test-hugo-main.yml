---
################################################################################################
# Hugo tag, build, release, & publish pipeline.                                                #
#                                                                                              #
# Uses the hugo-main.yml pipeline in the PipelineTemplates repository:                         #
#   https://github.com/redjax/PipelineTemplates/blob/main/.github/workflows/hugo-site-main.yml #
################################################################################################

name: Hugo Site Main

on:
  push:
    branches:
      - main
    paths:
      - "apps/hugo-site/archetypes/**"
      - "apps/hugo-site/content/**"
      - "apps/hugo-site/data/**"
      - "apps/hugo-site/i18n/**"
      - "apps/hugo-site/static/**"
      - "apps/hugo-site/hugo.yml"
      - "apps/hugo-site/go.mod"
      - "apps/hugo-site/go.sum"
      - "apps/hugo-site/.version"
      - "apps/hugo-site/.bumpversion.toml"

  workflow_dispatch:
    inputs:
      publish-targets:
        description: 'JSON array of publish targets, e.g. ["github-pages","cloudflare-pages","branch"]'
        required: false
        type: string
        default: '["github-pages","cloudflare-pages","branch"]'
      branch-name:
        type: string
        required: false
        default: "gh-pages"
      cloudflare-pages-project:
        type: string
        required: false
        default: "pipelinetemplates-test"
      cloudflare-pages-branch:
        type: string
        required: false
        default: "main"
      runner-img-or-label:
        type: string
        default: ubuntu-latest
      versioned:
        type: boolean
        required: false
        default: true
      use-hugo-cache:
        type: boolean
        required: false
        default: true
      clean-hugo-cache:
        type: boolean
        required: false
        default: false

jobs:
  pipeline:
    permissions:
      contents: write
      actions: write
      pull-requests: write
      pages: write
      id-token: write
    ## If you change this, make sure to also double check the templates-ref input below
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site-main.yml@topic/hugo-pipeline-refinement
    with:
      publish-targets: ${{ inputs.publish-targets || '["github-pages","cloudflare-pages","branch"]' }}
      hugo-version: "0.161.1"
      site-root: "apps/hugo-site"
      versioned: ${{ inputs.versioned || true }}
      version-file: ".version"
      bump-script: "shared/scripts/ci-cd/hugo/bump-site-version.sh"
      bump-config: ".bumpversion.toml"
      artifact-name: "hugo-site"
      release-prefix: "site"
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project || 'pipelinetemplates-test' }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch || 'main' }}
      branch-name: ${{ inputs.branch-name || 'gh-pages' }}
      runner-image: ${{ inputs.runner-img-or-label || 'ubuntu-latest' }}
      templates-ref: topic/hugo-pipeline-refinement
      hugo-build-flags: "--gc --minify"
      checkout-ref: ""
      debug-hugo-build-state: false
      use-hugo-cache: ${{ inputs.use-hugo-cache || true }}
      clean-hugo-cache: ${{ inputs.clean-hugo-cache || false }}
    secrets:
      release-bot-pat: ${{ secrets.RELEASE_BOT_PAT }}
      cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
