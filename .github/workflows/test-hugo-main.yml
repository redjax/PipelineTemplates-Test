---
################################################################################################
# Hugo tag, build, release, & publish pipeline.                                                #
#                                                                                              #
# Uses the hugo-main.yml pipeline in the PipelineTemplates repository:                         #
#   https://github.com/redjax/PipelineTemplates/blob/main/.github/workflows/hugo-site-main.yml #
################################################################################################
name: Hugo Site Main

on:
  push:
    branches:
      - main
    ## Use the path to the Hugo site's root (wherever the site was initialized).
    #  If it's a subdirectory, the path should be relative to the repo root.
    paths:
      - "apps/hugo-site/archetypes/**"
      - "apps/hugo-site/content/**"
      - "apps/hugo-site/data/**"
      - "apps/hugo-site/i18n/**"
      - "apps/hugo-site/static/**"
      - "apps/hugo-site/hugo.yml"
      - "apps/hugo-site/go.mod"
      - "apps/hugo-site/go.sum"

  workflow_dispatch:
    inputs:
      publish-gh-pages:
        type: boolean
        required: false
        default: false
      publish-to-branch:
        required: false
        default: false
        type: boolean
      branch-name:
        type: string
        required: false
        default: "gh-pages"
      publish-cf-pages:
        required: false
        default: false
        type: boolean
      runner-img-or-label:
        type: string
        default: ubuntu-latest

jobs:
  pipeline:
    permissions:
      contents: write
      actions: write
      pull-requests: write
      pages: write
      id-token: write
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site-main.yml@main
    with:
      site-root: "apps/hugo-site"
      versioned: true
      version-file: ".version"
      artifact-name: "hugo-site"
      release-prefix: "site"
      branch-name: ${{ inputs.branch-name || 'gh-pages' }}
      publish-gh-pages: ${{ github.event_name == 'push' || inputs.publish-gh-pages || false }}
      publish-to-branch: ${{ inputs.publish-to-branch || false }}
      publish-cf-pages: ${{ github.event_name == 'push' || inputs.publish-cf-pages || false }}
      cloudflare-pages-project: "pipelinetemplates-test"
      cloudflare-pages-branch: "main"
      runner-image: ${{ inputs.runner-img-or-label || 'ubuntu-latest' }}
      templates-ref: main
    secrets:
      release-bot-pat: ${{ secrets.RELEASE_BOT_PAT }}
      cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
