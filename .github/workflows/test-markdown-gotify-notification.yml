---
name: Test Gotify Markdown Notification

on:
  workflow_dispatch:

jobs:
  notify:
    # uses: redjax/PipelineTemplates/.github/workflows/gotify-notification.yml@github/notify-gotify@v0.0.0
    uses: redjax/PipelineTemplates/.github/workflows/gotify-notification.yml@feat/gotify-notification

    with:
      title: Pipeline Test

      message: |
        ## Pipeline Test - Markdown

        This is a test notification from:

        Repository: `${{ github.repository }}`
        Branch: `${{ github.ref_name }}`
        Commit: `${{ github.sha }}`

      content-type: text/markdown

      priority: 8

    secrets:
      gotify-url: ${{ secrets.GOTIFY_URL }}
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}
