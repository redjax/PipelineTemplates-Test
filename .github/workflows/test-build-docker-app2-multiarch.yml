---
name: Test Docker multi-arch build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Base tag to use"
        required: false
        type: string
        default: "latest"
      platforms:
        description: "Comma-separated platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: redjax/pipelinetemplates-test-app2

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Build and publish app2 (multi-arch)
        uses: redjax/PipelineTemplates/.github/actions/docker-build-publish@feat/gh-docker-build-publish
        with:
          context: containers/app2
          dockerfile: containers/app2/Dockerfile
          image_name: ${{ env.IMAGE_NAME }}
          tags: |
            ${{ inputs.tag }}
            sha-${{ github.sha }}
          push: ${{ inputs.push && 'true' || 'false' }}
          platforms: ${{ inputs.platforms }}
          build_args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cache_from: ""
          cache_to: ""
          registry: ${{ env.REGISTRY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
