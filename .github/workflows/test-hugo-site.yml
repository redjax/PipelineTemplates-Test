---
name: Test Hugo Site (build & release)

on:
  workflow_dispatch:
    inputs:
      release-mode:
        description: "none, unversioned, or versioned"
        required: true
        type: choice
        options:
          - none
          - unversioned
          - versioned
        default: none

      deploy-branch:
        description: "Deploy to branch"
        required: false
        type: boolean
        default: false

      deploy-github-pages:
        description: "Deploy to GitHub Pages"
        required: false
        type: boolean
        default: false

      deploy-cloudflare-pages:
        description: "Deploy to Cloudflare Pages"
        required: false
        type: boolean
        default: false

      deploy-github-release:
        description: "Create GitHub Release"
        required: false
        type: boolean
        default: false

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: gh-pages

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: Deploy Hugo site from test repo

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: pipelinetemplatest-test-hugo

      cloudflare-pages-branch:
        description: "Cloudflare production branch."
        required: false
        type: string
        default: main

      source-dir:
        description: "Path to the Hugo project root."
        required: false
        type: string
        default: apps/hugo-site

      version-file:
        description: "Path to the version file."
        required: false
        type: string
        default: apps/hugo-site/.version

      manual-version:
        description: "Explicit version for manual release runs."
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  version-bump:
    if: ${{ inputs.release-mode == 'versioned' }}
    uses: ./.github/workflows/hugo-version-bump.yml
    with:
      source-dir: ${{ inputs.source-dir }}
      version-file: ${{ inputs.version-file }}
      bumpversion-file: ${{ inputs.source-dir }}/.bumpversion.toml
      force: false
      bump-command: bump-my-version bump patch
    secrets: inherit

  build-and-release:
    needs: [version-bump]
    if: ${{ inputs.release-mode != 'versioned' || always() }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site.yml@feat/versioned-hugo-release
    with:
      source-dir: ${{ inputs.source-dir }}
      public-dir: public
      build-flags: --gc --minify --enableGitInfo
      hugo-version: 0.161.1
      extended: true
      use-cache: true
      artifact-name: hugo-site
      archive-name: site
      archive-output-dir: dist
      archive-format: both
      check-changed: false
      changed-paths-mode: default
      changed-paths: ""
      release-mode: ${{ inputs.release-mode }}
      deploy-branch: ${{ inputs.deploy-branch }}
      deploy-github-pages: ${{ inputs.deploy-github-pages }}
      deploy-cloudflare-pages: ${{ inputs.deploy-cloudflare-pages }}
      deploy-github-release: ${{ inputs.deploy-github-release }}
      versioning-mode: ${{ inputs.release-mode == 'versioned' && 'auto' || 'none' }}
      version-file: ${{ inputs.version-file }}
      manual-version: ${{ inputs.manual-version }}
      create-release: true
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      base-url: ""
      release-prefix: site
    secrets: inherit
