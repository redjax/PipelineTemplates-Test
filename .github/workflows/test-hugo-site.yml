---
name: Test Hugo site release

on:
  push:
    branches:
      - main
      - feat/test-hugo-pipelines
    # paths:
    #   - "apps/hugo-site/archetypes/**"
    #   - "apps/hugo-site/content/**"
    #   - "apps/hugo-site/data/**"
    #   - "apps/hugo-site/i18n/**"
    #   - "apps/hugo-site/static/**"
    #   - "apps/hugo-site/hugo.yml"
    #   - "apps/hugo-site/go.mod"
    #   - "apps/hugo-site/go.sum"

  workflow_dispatch:
    inputs:
      deploy-pages:
        description: "Deploy GitHub Pages after release."
        required: false
        type: boolean
        default: false

      deploy-cloudflare-pages:
        description: "Deploy Cloudflare Pages after release."
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: redjax/pipelinetemplates/.github/workflows/hugo-gh-release.yml@feat/release-publish-workflows
    with:
      versioned: false
      release-prefix: "site"
      artifact-name: "hugo-site"
    secrets:
      release-bot-pat: ${{ secrets.RELEASE_BOT_PAT }}
