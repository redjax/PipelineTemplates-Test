---
name: Test Hugo Site (build & release)

on:
  workflow_dispatch:
    inputs:
      deploy-branch:
        description: "Deploy to branch"
        required: false
        type: boolean
        default: true

      deploy-github-pages:
        description: "Deploy to GitHub Pages"
        required: false
        type: boolean
        default: false

      deploy-cloudflare-pages:
        description: "Deploy to Cloudflare Pages"
        required: false
        type: boolean
        default: false

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: gh-pages

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: Deploy Hugo site from test repo

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: pipelinetemplatest-test-hugo

      cloudflare-pages-branch:
        description: "Cloudflare production branch."
        required: false
        type: string
        default: main

      versioning-mode:
        description: "Versioning mode for releases."
        required: false
        type: choice
        options:
          - none
          - auto
          - manual
        default: none

      manual-version:
        description: "Explicit version for manual release runs."
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v7

      - name: Build site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@main
        with:
          hugo-version: "0.161.1"
          extended: true
          source-dir: apps/hugo-site
          public-dir: public
          base-url: ""
          build-flags: --gc --minify
          use-cache: true
          cache-key-suffix: ${{ github.repository }}
          check-changed: false
          changed-paths-mode: default
          changed-paths: ""
          publish-artifact: "true"
          artifact-name: hugo-site
          archive-name: site
          archive-output-dir: dist
          archive-format: both

      - name: Export artifact name
        id: meta
        shell: bash
        run: echo "artifact-name=hugo-site" >> "$GITHUB_OUTPUT"

  publish-branch:
    needs: build
    if: ${{ inputs.deploy-branch == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/hugo-site-pipeline-implementation
    with:
      target: branch
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      dry-run: false
    secrets: inherit

  publish-github-pages:
    needs: build
    if: ${{ inputs.deploy-github-pages == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/hugo-site-pipeline-implementation
    with:
      target: github-pages
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      dry-run: false
    secrets: inherit

  publish-cloudflare-pages:
    needs: build
    if: ${{ inputs.deploy-cloudflare-pages == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/hugo-site-pipeline-implementation
    with:
      target: cloudflare-pages
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      dry-run: false
    secrets: inherit
