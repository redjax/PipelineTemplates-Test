name: Test Hugo Site (build & release)

on:
  workflow_dispatch:
    inputs:
      deploy-branch:
        description: "Deploy to branch"
        required: false
        type: boolean
        default: true

      deploy-github-pages:
        description: "Deploy to GitHub Pages"
        required: false
        type: boolean
        default: false

      deploy-cloudflare-pages:
        description: "Deploy to Cloudflare Pages"
        required: false
        type: boolean
        default: false

      deploy-github-release:
        description: "Create GitHub Release"
        required: false
        type: boolean
        default: false

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: gh-pages

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: Deploy Hugo site from test repo

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: pipelinetemplatest-test-hugo

      cloudflare-pages-branch:
        description: "Cloudflare production branch."
        required: false
        type: string
        default: main

      versioning-mode:
        description: "Versioning mode for releases."
        required: false
        type: choice
        options:
          - none
          - auto
          - manual
        default: none

      manual-version:
        description: "Explicit version for manual release runs."
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      release-version: ${{ steps.meta.outputs.release-version }}
      release-name: ${{ steps.meta.outputs.release-name }}
      release-tag: ${{ steps.meta.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Build site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@main
        with:
          hugo-version: "0.161.1"
          extended: true
          source-dir: apps/hugo-site
          public-dir: public
          base-url: ""
          build-flags: --gc --minify
          use-cache: true
          cache-key-suffix: ${{ github.repository }}
          check-changed: false
          changed-paths-mode: default
          changed-paths: ""
          publish-artifact: "true"
          artifact-name: hugo-site
          archive-name: site
          archive-output-dir: dist
          archive-format: both

      - name: Compute release metadata
        id: meta
        shell: bash
        env:
          VERSIONING_MODE: ${{ inputs.versioning-mode }}
          MANUAL_VERSION: ${{ inputs.manual-version }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          version=""
          tag=""
          name=""

          case "${VERSIONING_MODE}" in
            none)
              ;;
            manual)
              if [[ -n "${MANUAL_VERSION}" ]]; then
                version="${MANUAL_VERSION#v}"
                version="${version#hugo/}"
                tag="site-v${version}"
                name="Site v${version}"
              else
                version="${GITHUB_SHA::7}"
                tag="site-${version}"
                name="site-${version}"
              fi
              ;;
            auto)
              version="${GITHUB_SHA::7}"
              tag="site-${version}"
              name="site-${version}"
              ;;
          esac

          echo "artifact-name=hugo-site" >> "$GITHUB_OUTPUT"
          echo "release-version=${version}" >> "$GITHUB_OUTPUT"
          echo "release-name=${name}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${tag}" >> "$GITHUB_OUTPUT"

  publish-branch:
    needs: build
    if: ${{ inputs.deploy-branch == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish-branch.yml@feat/hugo-site-pipeline-implementation
    with:
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      dry-run: false
    secrets: inherit

  publish-github-pages:
    needs: build
    if: ${{ inputs.deploy-github-pages == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish-github-pages.yml@feat/hugo-site-pipeline-implementation
    with:
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      dry-run: false
    secrets: inherit

  publish-cloudflare-pages:
    needs: build
    if: ${{ inputs.deploy-cloudflare-pages == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish-cloudflare-pages.yml@feat/hugo-site-pipeline-implementation
    with:
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      dry-run: false
    secrets: inherit

  publish-github-release:
    needs: build
    if: ${{ inputs.deploy-github-release == true }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish-github-release.yml@feat/hugo-site-pipeline-implementation
    with:
      run-id: ${{ github.run_id }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      release-name: ${{ needs.build.outputs.release-name }}
      release-version: ${{ needs.build.outputs.release-version }}
      release-tag: ${{ needs.build.outputs.release-tag }}
      dry-run: false
    secrets: inherit
