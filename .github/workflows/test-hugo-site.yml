---
name: Test Hugo site release

on:
  push:
    branches:
      - feat/test-hugo-pipelines
  workflow_run:
    workflows:
      - Test Hugo site build
    types:
      - completed

  workflow_dispatch:
    inputs:
      build-run-id:
        description: "Optional build run id to release from."
        required: false
        type: number
        default: 0

permissions:
  actions: read
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-gh-release.yml@feat/release-publish-workflows
    with:
      versioned: false
      release-prefix: "site"
      artifact-name: "hugo-site"
      build-run-id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.build-run-id }}
    secrets:
      release-bot-pat: ${{ secrets.RELEASE_BOT_PAT }}
