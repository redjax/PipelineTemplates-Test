name: test-hugo-site

on:
  workflow_dispatch:
    inputs:
      deploy-branch:
        description: "Deploy to branch"
        required: false
        type: boolean
        default: true

      deploy-github-pages:
        description: "Deploy to GitHub Pages"
        required: false
        type: boolean
        default: false

      deploy-cloudflare-pages:
        description: "Deploy to Cloudflare Pages"
        required: false
        type: boolean
        default: false

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: gh-pages

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: Deploy Hugo site from test repo

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: pipelinetemplatest-test-hugo

      cloudflare-pages-branch:
        description: "Cloudflare branch name."
        required: false
        type: string
        default: main

      versioning-mode:
        description: "Versioning mode for releases."
        required: false
        type: choice
        options:
          - none
          - auto
          - manual
        default: none

      manual-version:
        description: "Explicit version for manual release runs."
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  branch:
    if: ${{ inputs.deploy-branch }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site.yml@feat/hugo-site-pipeline-implementation
    with:
      source-dir: apps/hugo-site
      public-dir: public
      build-flags: --gc --minify
      hugo-version: "0.161.1"
      extended: true
      use-cache: true
      artifact-name: hugo-site
      archive-name: site
      archive-output-dir: dist
      archive-format: both
      check-changed: false
      changed-paths-mode: default
      changed-paths: ""
      deploy-target: branch
      versioning-mode: ${{ inputs.versioning-mode }}
      version-file: .version
      manual-version: ${{ inputs.manual-version }}
      create-release: true
      deploy-pages: true
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      cloudflare-api-token-secret-name: ""
      cloudflare-account-id-secret-name: ""
      base-url: ""
      release-prefix: site
    secrets: inherit

  github-pages:
    if: ${{ inputs.deploy-github-pages }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site.yml@feat/hugo-site-pipeline-implementation
    with:
      source-dir: apps/hugo-site
      public-dir: public
      build-flags: --gc --minify
      hugo-version: "0.161.1"
      extended: true
      use-cache: true
      artifact-name: hugo-site
      archive-name: site
      archive-output-dir: dist
      archive-format: both
      check-changed: false
      changed-paths-mode: default
      changed-paths: ""
      deploy-target: github-pages
      versioning-mode: ${{ inputs.versioning-mode }}
      version-file: .version
      manual-version: ${{ inputs.manual-version }}
      create-release: true
      deploy-pages: true
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      cloudflare-api-token-secret-name: ""
      cloudflare-account-id-secret-name: ""
      base-url: ""
      release-prefix: site
    secrets: inherit

  cloudflare-pages:
    if: ${{ inputs.deploy-cloudflare-pages }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site.yml@feat/hugo-site-pipeline-implementation
    with:
      source-dir: apps/hugo-site
      public-dir: public
      build-flags: --gc --minify
      hugo-version: "0.161.1"
      extended: true
      use-cache: true
      artifact-name: hugo-site
      archive-name: site
      archive-output-dir: dist
      archive-format: both
      check-changed: false
      changed-paths-mode: default
      changed-paths: ""
      deploy-target: cloudflare-pages
      versioning-mode: ${{ inputs.versioning-mode }}
      version-file: .version
      manual-version: ${{ inputs.manual-version }}
      create-release: true
      deploy-pages: true
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: public
      cloudflare-api-token-secret-name: CLOUDFLARE_API_TOKEN
      cloudflare-account-id-secret-name: CLOUDFLARE_ACCOUNT_ID
      base-url: ""
      release-prefix: site
    secrets: inherit
