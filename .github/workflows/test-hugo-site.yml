---
name: Test Hugo Site (build & release)

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  detect-changes:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      hugo_changed: ${{ steps.filter.outputs.hugo_changed }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check Hugo changes
        id: filter
        shell: bash
        run: |
          set -Eeuo pipefail

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "${base}" "${head}" > /tmp/changed-files.txt || true

          if grep -qE '^apps/hugo-site/.*' /tmp/changed-files.txt; then
            echo "hugo_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "hugo_changed=false" >> "$GITHUB_OUTPUT"
          fi

  version-bump:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.hugo_changed == 'true' }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-version-bump.yml@feat/versioned-hugo-release
    with:
      source-dir: apps/hugo-site
      version-file: apps/hugo-site/.version
      bumpversion-file: apps/hugo-site/.bumpversion.toml
      force: false
    secrets: inherit

  build-and-release:
    needs:
      - detect-changes
      - version-bump
    if: ${{ needs.detect-changes.outputs.hugo_changed == 'true' && needs.version-bump.result == 'success' }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site.yml@feat/versioned-hugo-release
    with:
      source-dir: apps/hugo-site
      public-dir: public
      build-flags: --gc --minify --enableGitInfo
      hugo-version: 0.161.1
      extended: true
      use-cache: true
      artifact-name: hugo-site
      archive-name: site
      archive-output-dir: dist
      archive-format: both
      check-changed: false
      changed-paths-mode: default
      changed-paths: ""
      release-mode: versioned
      deploy-branch: false
      deploy-github-pages: true
      deploy-cloudflare-pages: true
      deploy-github-release: true
      versioning-mode: auto
      version-file: apps/hugo-site/.version
      manual-version: ""
      create-release: true
      branch-name: gh-pages
      commit-message: Deploy Hugo site from test repo
      cloudflare-pages-project: pipelinetemplatest-test-hugo
      cloudflare-pages-branch: main
      cloudflare-pages-directory: public
      base-url: ""
      release-prefix: site
    secrets: inherit
