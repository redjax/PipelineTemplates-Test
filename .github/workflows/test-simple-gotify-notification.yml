---
name: Test Gotify notification

on:
  workflow_dispatch:

jobs:
  notify:
    # uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify@v0.0.0
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@feat/refactor-gotify-script

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      message: Notification from the PipelineTemplates test repository
      priority: 3

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}
