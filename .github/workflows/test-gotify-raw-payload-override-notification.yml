---
name: Test Gotify Raw Payload Notification

on:
  workflow_dispatch:

jobs:
  notify:
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.1

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      raw-json-payload: |
        {
          "title": "Pipeline Test",
          "message": "Fully custom request",
          "priority": 10,
          "extras": {
            "client::display": {
              "contentType": "text/markdown"
            },
            "custom::advanced": {
              "foo": "bar"
            }
          }
        }

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}
