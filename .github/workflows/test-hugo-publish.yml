---
name: test-hugo-publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target: branch, github-pages, or cloudflare-pages."
        required: true
        type: choice
        options:
          - branch
          - github-pages
          - cloudflare-pages
        default: branch

      run-id:
        description: "Build workflow run ID to publish from. Leave blank to use the most recent successful build."
        required: false
        type: string
        default: ""

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: "gh-pages"

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: "Deploy Hugo site from test repo"

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: ""

      cloudflare-pages-branch:
        description: "Cloudflare branch name."
        required: false
        type: string
        default: ""

      cloudflare-pages-directory:
        description: "Directory to deploy to Cloudflare Pages."
        required: false
        type: string
        default: "public"

      dry-run:
        description: "If true, do not push/deploy."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  resolve-run:
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.pick.outputs.run-id }}
    steps:
      - name: Pick build run id
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run-id }}
        run: |
          set -Eeuo pipefail

          if [ -n "$RUN_ID" ]; then
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_run_id="$(gh run list \
            --workflow test-hugo-build.yml \
            --limit 20 \
            --json databaseId,conclusion \
            --jq '.[] | select(.conclusion == "success") | .databaseId' \
            | head -n 1)"

          if [ -z "$latest_run_id" ]; then
            echo "No successful test-hugo-build run found."
            exit 1
          fi

          echo "run-id=$latest_run_id" >> "$GITHUB_OUTPUT"

  publish-branch:
    if: ${{ inputs.target == 'branch' }}
    needs: resolve-run
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/gh-hugo-build-deploy
    with:
      target: branch
      artifact-name: hugo-site
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit

  publish-github-pages:
    if: ${{ inputs.target == 'github-pages' }}
    needs: resolve-run
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/gh-hugo-build-deploy
    with:
      target: github-pages
      artifact-name: hugo-site
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit

  publish-cloudflare-pages:
    if: ${{ inputs.target == 'cloudflare-pages' }}
    needs: resolve-run
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/gh-hugo-build-deploy
    with:
      target: cloudflare-pages
      artifact-name: hugo-site
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: ${{ inputs.cloudflare-pages-directory }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
