---
name: test-hugo-publish

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Publish to branch."
        required: false
        type: boolean
        default: true

      github-pages:
        description: "Publish to GitHub Pages."
        required: false
        type: boolean
        default: false

      cloudflare-pages:
        description: "Publish to Cloudflare Pages."
        required: false
        type: boolean
        default: false

      github-release:
        description: "Publish to GitHub Release."
        required: false
        type: boolean
        default: false

      run-id:
        description: "Build workflow run ID to publish from. Leave blank to use the most recent successful build."
        required: false
        type: string
        default: ""

      branch-name:
        description: "Target branch for branch deploys."
        required: false
        type: string
        default: "gh-pages"

      commit-message:
        description: "Commit message for branch deploys."
        required: false
        type: string
        default: "Deploy Hugo site from test repo"

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: "pipelinetemplatest-test-hugo"

      cloudflare-pages-branch:
        description: "Cloudflare branch name."
        required: false
        type: string
        default: "main"

      cloudflare-pages-directory:
        description: "Directory to deploy to Cloudflare Pages."
        required: false
        type: string
        default: "public"

      release-name:
        description: "GitHub release name."
        required: false
        type: string
        default: ""

      release-version:
        description: "Optional version string used to build a tag and archive names."
        required: false
        type: string
        default: ""

      release-tag:
        description: "Optional explicit Git tag to use for the GitHub release."
        required: false
        type: string
        default: ""

      dry-run:
        description: "Do a dry run without publishing."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  resolve-run:
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.pick.outputs.run-id }}
      release-name: ${{ steps.meta.outputs.release-name }}
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Pick build run id
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run-id }}
          REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          if [ -n "$RUN_ID" ]; then
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_run_id="$(gh api "repos/${REPO}/actions/workflows/test-hugo-build.yml/runs?status=success&per_page=1" --jq '.workflow_runs[0].id')"

          if [ -z "$latest_run_id" ] || [ "$latest_run_id" = "null" ]; then
            echo "No successful test-hugo-build run found."
            exit 1
          fi

          echo "run-id=$latest_run_id" >> "$GITHUB_OUTPUT"

      - name: Compute release name
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_NAME: ${{ inputs.release-name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          if [ -n "$INPUT_RELEASE_NAME" ]; then
            NAME="$INPUT_RELEASE_NAME"
          else
            NAME="site-${GITHUB_SHA:0:7}"
          fi

          echo "release-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Compute selected targets
        id: targets
        shell: bash
        env:
          DO_BRANCH: ${{ inputs.branch }}
          DO_GH_PAGES: ${{ inputs.github-pages }}
          DO_CF_PAGES: ${{ inputs.cloudflare-pages }}
          DO_GH_RELEASE: ${{ inputs.github-release }}
        run: |
          set -Eeuo pipefail

          targets=()

          if [[ "${DO_BRANCH}" == "true" ]]; then
            targets+=("branch")
          fi

          if [[ "${DO_GH_PAGES}" == "true" ]]; then
            targets+=("github-pages")
          fi

          if [[ "${DO_CF_PAGES}" == "true" ]]; then
            targets+=("cloudflare-pages")
          fi

          if [[ "${DO_GH_RELEASE}" == "true" ]]; then
            targets+=("github-release")
          fi

          if (( ${#targets[@]} == 0 )); then
            targets+=("branch")
          fi

          targets_json="$(printf '%s\n' "${targets[@]}" | jq -R . | jq -s -c .)"
          echo "targets=${targets_json}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve-run
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-run.outputs.targets) }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@feat/release-artifact-types
    with:
      target: ${{ matrix.target }}
      run-id: ${{ needs.resolve-run.outputs.run-id }}
      artifact-name: hugo-site
      branch-name: ${{ inputs.branch-name }}
      commit-message: ${{ inputs.commit-message }}
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: ${{ inputs.cloudflare-pages-directory }}
      release-name: ${{ needs.resolve-run.outputs.release-name }}
      release-version: ${{ inputs.release-version }}
      release-tag: ${{ inputs.release-tag }}
      dry-run: ${{ inputs.dry-run }}
    secrets:
      cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
