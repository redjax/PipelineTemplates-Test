---
###################################################
# Unified test pipeline for Gotify notifications. #
###################################################

name: Test Gotify Notifications

on:
  workflow_dispatch:
    inputs:
      simple:
        description: "Run simple notification"
        required: false
        default: false
        type: boolean

      clickable:
        description: "Run clickable notification"
        required: false
        default: false
        type: boolean

      markdown:
        description: "Run markdown notification"
        required: false
        default: false
        type: boolean

      big-image:
        description: "Run image notification"
        required: false
        default: false
        type: boolean

      multipart:
        description: "Run multipart form notification"
        required: false
        default: false
        type: boolean

      merged-extras:
        description: "Run merged extras notification"
        required: false
        default: false
        type: boolean

      raw-json:
        description: "Run raw JSON payload notification"
        required: false
        default: false
        type: boolean

env:
  GOTIFY_URL: ${{ vars.GOTIFY_URL }}

jobs:
  simple:
    if: inputs.simple
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      message: Simple Gotify notification test
      priority: 3

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  clickable:
    if: inputs.clickable
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      message: Click to open workflow run
      click-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      priority: 5

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  markdown:
    if: inputs.markdown
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      content-type: text/markdown
      message: |
        ## Pipeline Test - Markdown

        This is a test notification from:

        - Repository: `${{ github.repository }}`
        - Branch: `${{ github.ref_name }}`
        - Commit: `${{ github.sha }}`

      priority: 8

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  big-image:
    if: inputs.big-image
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      message: Test notification with embedded image
      big-image-url: https://res.cloudinary.com/utiblog/image/upload/f_auto,q_auto/pipeline-welder_hero.webp
      priority: 5

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  multipart:
    if: inputs.multipart
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      use-json: false
      title: Pipeline Test
      message: |
        This notification was sent using multipart/form-data mode.

        Only title, message, and priority are supported.
      priority: 2

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  merged-extras:
    if: inputs.merged-extras
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      title: Pipeline Test
      message: Test notification with merged extras
      extras-json: |
        {
          "custom::ci": {
            "pipeline": "deploy",
            "environment": "production"
          }
        }

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}

  raw-json:
    if: inputs.raw-json
    uses: redjax/PipelineTemplates/.github/workflows/notify-gotify.yml@github/notify-gotify/v0.0.3

    with:
      gotify-url: ${{ vars.GOTIFY_URL }}
      raw-json-payload: |
        {
          "title": "Pipeline Test",
          "message": "Raw JSON payload test",
          "priority": 10,
          "extras": {
            "client::display": {
              "contentType": "text/markdown"
            }
          }
        }

    secrets:
      gotify-token: ${{ secrets.GOTIFY_TOKEN }}
