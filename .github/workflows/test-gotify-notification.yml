---
###################################################
# Unified test pipeline for Gotify notifications. #
###################################################

name: Test Gotify Notifications

on:
  workflow_dispatch:
    inputs:
      simple:
        description: "Run simple notification"
        required: false
        default: false
        type: boolean

      clickable:
        description: "Run clickable notification"
        required: false
        default: false
        type: boolean

      markdown:
        description: "Run markdown notification"
        required: false
        default: false
        type: boolean

      big-image:
        description: "Run image notification"
        required: false
        default: false
        type: boolean

      multipart:
        description: "Run multipart form notification"
        required: false
        default: false
        type: boolean

      merged-extras:
        description: "Run merged extras notification"
        required: false
        default: false
        type: boolean

      raw-json:
        description: "Run raw JSON payload notification"
        required: false
        default: false
        type: boolean

env:
  GOTIFY_URL: ${{ vars.GOTIFY_URL }}

jobs:
  simple:
    if: inputs.simple
    runs-on: ubuntu-latest
    steps:
      - name: Simple notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          title: "Pipeline Test"
          message: "Simple Gotify notification test"
          priority: "3"
          use-json: "true"
          content-type: "text/plain"
          click-url: ""
          big-image-url: ""
          intent-url: ""
          extras-json: "{}"
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  clickable:
    if: inputs.clickable
    runs-on: ubuntu-latest
    steps:
      - name: Clickable notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          title: "Pipeline Test"
          message: "Click to open workflow run"
          priority: "5"
          use-json: "true"
          content-type: "text/plain"
          click-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          big-image-url: ""
          intent-url: ""
          extras-json: "{}"
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  markdown:
    if: inputs.markdown
    runs-on: ubuntu-latest
    steps:
      - name: Markdown notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          title: "Pipeline Test"
          content-type: "text/markdown"
          message: |
            ## Pipeline Test - Markdown

            This is a test notification from:

            - Repository: `${{ github.repository }}`
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
          priority: "8"
          use-json: "true"
          click-url: ""
          big-image-url: ""
          intent-url: ""
          extras-json: "{}"
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  big-image:
    if: inputs.big-image
    runs-on: ubuntu-latest
    steps:
      - name: Big image notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          title: "Pipeline Test"
          message: "Test notification with embedded image"
          priority: "5"
          use-json: "true"
          content-type: "text/plain"
          click-url: ""
          big-image-url: "https://res.cloudinary.com/utiblog/image/upload/f_auto,q_auto/pipeline-welder_hero.webp"
          intent-url: ""
          extras-json: "{}"
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  multipart:
    if: inputs.multipart
    runs-on: ubuntu-latest
    steps:
      - name: Multipart notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          use-json: "false"
          title: "Pipeline Test"
          message: |
            This notification was sent using multipart/form-data mode.

            Only title, message, and priority are supported.
          priority: "2"
          content-type: "text/plain"
          click-url: ""
          big-image-url: ""
          intent-url: ""
          extras-json: "{}"
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  merged-extras:
    if: inputs.merged-extras
    runs-on: ubuntu-latest
    steps:
      - name: Merged extras notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          title: "Pipeline Test"
          message: "Test notification with merged extras"
          priority: "5"
          use-json: "true"
          content-type: "text/plain"
          click-url: ""
          big-image-url: ""
          intent-url: ""
          extras-json: |
            {
              "custom::ci": {
                "pipeline": "deploy",
                "environment": "production"
              }
            }
          raw-json-payload: ""
          user-agent: "redjax/PipelineTemplates"
          debug: "false"

  raw-json:
    if: inputs.raw-json
    runs-on: ubuntu-latest
    steps:
      - name: Raw JSON notification
        uses: redjax/PipelineTemplates/.github/actions/notify-gotify@gh/notify-gotify/v0.0.1
        with:
          gotify-url: ${{ env.GOTIFY_URL }}
          gotify-token: ${{ secrets.GOTIFY_TOKEN }}
          # raw-json-payload completely overrides the generated payload
          raw-json-payload: |
            {
              "title": "Pipeline Test",
              "message": "Raw JSON payload test",
              "priority": 10,
              "extras": {
                "client::display": {
                  "contentType": "text/markdown"
                }
              }
            }
          # other fields mostly ignored when raw-json-payload is set
          title: ""
          message: ""
          priority: "0"
          use-json: "true"
          content-type: "text/plain"
          click-url: ""
          big-image-url: ""
          intent-url: ""
          extras-json: "{}"
          user-agent: "redjax/PipelineTemplates"
          debug: "false"
